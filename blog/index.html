<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Posts | arpiku</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="icon" href="../assets/logo.png">
</head>
<body>
  <canvas id="gol-canvas"></canvas>
  
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <svg class="sun-icon" viewBox="0 0 24 24" style="display: none;">
      <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
    </svg>
    <svg class="moon-icon" viewBox="0 0 24 24">
      <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
    </svg>
  </button>
  
  <button class="gol-toggle" id="gol-toggle" aria-label="Toggle background animation">
    <svg class="play-icon" viewBox="0 0 24 24" style="display: none;">
      <path d="M8 5v14l11-7z"/>
    </svg>
    <svg class="pause-icon" viewBox="0 0 24 24">
      <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
    </svg>
  </button>
  
  <div class="page-content">
    <a href="../index.html" class="back-link">← Home</a>
    
    <header class="page-header">
      <h1 class="page-title">BLOG POSTS</h1>
      <p class="page-subtitle">// thoughts, tutorials & experiments</p>
    </header>
    
    <div class="posts-list" id="posts-list"></div>
  </div>
  
  <script src="../assets/js/gol.js"></script>
  <script>
    (function() {
      const toggle = document.getElementById('theme-toggle');
      const sunIcon = toggle.querySelector('.sun-icon');
      const moonIcon = toggle.querySelector('.moon-icon');
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      updateIcon(savedTheme);
      function updateIcon(theme) {
        if (theme === 'light') {
          sunIcon.style.display = 'block';
          moonIcon.style.display = 'none';
        } else {
          sunIcon.style.display = 'none';
          moonIcon.style.display = 'block';
        }
      }
      toggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateIcon(next);
      });
      
      const golToggle = document.getElementById('gol-toggle');
      const playIcon = golToggle.querySelector('.play-icon');
      const pauseIcon = golToggle.querySelector('.pause-icon');
      let golRunning = true;
      
      function updateGolIcon(running) {
        if (running) {
          playIcon.style.display = 'none';
          pauseIcon.style.display = 'block';
        } else {
          playIcon.style.display = 'block';
          pauseIcon.style.display = 'none';
        }
      }
      
      golToggle.addEventListener('click', () => {
        if (window.toggleGoL) {
          golRunning = window.toggleGoL();
        } else {
          golRunning = !golRunning;
        }
        updateGolIcon(golRunning);
      });
      
      const posts = [
        { title: "Pretty Printing Interactive List Haskell", date: "2024-08-05", excerpt: "Implementing a pretty printer for interactive lists in Haskell with proper formatting and user interaction...", url: "posts/pretty-printing-interactive-list-haskell.html", tags: ["Haskell", "Functional Programming"] },
        { title: "On Hating Windows", date: "2024-07-16", excerpt: "My journey and frustrations with Windows as a development environment and why I switched to Linux...", url: "posts/on-hating-windows.html", tags: ["Linux", "Windows", "Opinion"] },
        { title: "Awesome Functional Programming Resources", date: "2024-06-28", excerpt: "A curated collection of resources for learning functional programming concepts and languages like Haskell...", url: "posts/awesome-functional-programming-resources.html", tags: ["Haskell", "Functional Programming"] },
        { title: "Making TP-Link T2UB Archer Nano Work On NixOS", date: "2024-04-14", excerpt: "A guide to getting TP-Link network adapters working on NixOS with proper driver configuration...", url: "posts/making-tp-link-t2ub-archer-nano-work-on-nixos.html", tags: ["Linux", "NixOS", "Networking"] },
        { title: "Streaming Data From Arduino To Website Using Python", date: "2024-03-12", excerpt: "Exploring the integration between Arduino microcontrollers and Python for physical computing projects...", url: "posts/streaming-data-from-arduino-to-website-using-python.html", tags: ["Arduino", "Python", "Electronics"] },
        { title: "Javascript 30 Problems With Solutions", date: "2024-02-27", excerpt: "30 days of JavaScript LeetCode challenge - exploring various problems and their solutions in JavaScript...", url: "posts/javascript-30-problems-with-solutions.html", tags: ["JavaScript", "Algorithms"] },
        { title: "Discussing Leetcode Problems And Their Different Solutions", date: "2024-02-24", excerpt: "The problem is rather simple when going with a naive solution, using a O(n^2) solution by looping through all the unique pairs...", url: "posts/discussing-leetcode-problems-and-their-different-solutions.html", tags: ["C++", "Algorithms", "Leetcode"] },
        { title: "For The Love Of Engineering", date: "2024-02-25", excerpt: "I remember the first time I learned about HTML. It was a book that I got from a friend, internet was something I knew about but as a kid all of it was still a mystery...", url: "posts/for-the-love-of-engineering.html", tags: ["Journal", "Engineering"] }
      ];
      
      const postsList = document.getElementById('posts-list');
      postsList.innerHTML = posts.map(post => `
        <a href="${post.url}" class="post-card" style="text-decoration: none;">
          <div class="post-date">${post.date}</div>
          <h2 class="post-title">${post.title}</h2>
          <p class="post-excerpt">${post.excerpt}</p>
          <div class="post-tags">
            ${post.tags.map(tag => '<span class="post-tag">' + tag + '</span>').join('')}
          </div>
        </a>
      `).join('');
    })();
  </script>
</body>
</html>
