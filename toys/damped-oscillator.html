<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Damped Oscillator | arpiku</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="icon" href="../assets/logo.png">
  <style>
    body.fullscreen {
      background: var(--black);
    }
    
    body.fullscreen::before {
      display: none;
    }
    
    body.fullscreen #gol-canvas {
      display: none;
    }
    
    .fullscreen .page-content {
      background: transparent;
      min-height: 100vh;
      padding-top: 4rem;
    }
    
    body.fullscreen {
      overflow: hidden;
    }
    
    .page-content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }
    
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--white);
      text-decoration: none;
      font-size: 1.1rem;
      padding: 0.4rem 0.8rem;
      border: 2px solid var(--gray-light);
      border-radius: 6px;
      background: rgba(15, 15, 15, 0.85);
      transition: all 0.2s ease;
      margin: 0.5rem;
      align-self: flex-start;
    }
    
    .back-link:hover {
      border-color: var(--red);
      color: var(--red-bright);
      box-shadow: 0 0 15px rgba(204, 34, 34, 0.3);
    }
    
    .toy-header {
      text-align: center;
      padding: 1rem;
    }
    
    .toy-title {
      font-size: 2rem;
      letter-spacing: 0.1em;
      text-shadow: 0 0 20px rgba(204, 34, 34, 0.3);
    }
    
    .toy-container {
      flex: 1;
      display: flex;
      gap: 1rem;
      padding: 0.5rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }
    
    .canvas-container {
      flex: 1;
      background: rgba(10, 10, 10, 0.9);
      border: 2px solid var(--gray);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    
    #oscillator-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    .controls-panel {
      width: 300px;
      background: rgba(15, 15, 15, 0.95);
      border: 2px solid var(--gray);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    
    .control-section {
      border-bottom: 1px solid var(--gray);
      padding-bottom: 1rem;
    }
    
    .control-section:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    
    .control-title {
      font-size: 1.2rem;
      color: var(--red-bright);
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }
    
    .control-group {
      margin-bottom: 1rem;
    }
    
    .control-label {
      display: flex;
      justify-content: space-between;
      font-size: 1rem;
      color: var(--white-dim);
      margin-bottom: 0.5rem;
    }
    
    .control-value {
      color: var(--white);
      font-weight: bold;
    }
    
    .control-slider {
      width: 100%;
      height: 8px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--black-light);
      border-radius: 4px;
      outline: none;
      border: 1px solid var(--gray);
    }
    
    .control-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--red);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(204, 34, 34, 0.5);
      transition: all 0.2s ease;
    }
    
    .control-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 20px rgba(204, 34, 34, 0.8);
    }
    
    .control-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--red);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(204, 34, 34, 0.5);
    }
    
    .button-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    
    .control-btn {
      flex: 1;
      min-width: 80px;
      padding: 0.6rem 1rem;
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      border: 2px solid var(--gray-light);
      border-radius: 6px;
      background: var(--black-light);
      color: var(--white);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .control-btn:hover {
      border-color: var(--red);
      background: rgba(204, 34, 34, 0.2);
    }
    
    .control-btn.active {
      background: var(--red);
      border-color: var(--red);
    }
    
    .energy-display {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    
    .energy-item {
      background: var(--black-light);
      padding: 0.8rem;
      border-radius: 6px;
      text-align: center;
      border: 1px solid var(--gray);
    }
    
    .energy-label {
      font-size: 0.9rem;
      color: var(--white-dim);
    }
    
    .energy-value {
      font-size: 1.3rem;
      color: var(--red-bright);
      margin-top: 0.3rem;
    }
    
    .formula {
      background: var(--black-light);
      padding: 1rem;
      border-radius: 6px;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--white-dim);
      border: 1px solid var(--gray);
    }
    
    .formula code {
      color: var(--red-bright);
      font-family: 'Courier New', monospace;
    }
    
    @media (max-width: 900px) {
      .toy-container {
        flex-direction: column;
      }
      
      .controls-panel {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
      }
      
      .control-section {
        flex: 1;
        min-width: 200px;
        border-bottom: none;
        padding-bottom: 0;
      }
    }
    
    @media (max-width: 600px) {
      .toy-title {
        font-size: 1.5rem;
      }
      
      .controls-panel {
        padding: 1rem;
      }
    }
  </style>
</head>
<body class="fullscreen">
  <canvas id="gol-canvas"></canvas>
  
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <svg class="sun-icon" viewBox="0 0 24 24" style="display: none;">
      <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
    </svg>
    <svg class="moon-icon" viewBox="0 0 24 24">
      <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
    </svg>
  </button>
  
  <div class="page-content">
    <a href="index.html" class="back-link">← Webtoys</a>
    
    <header class="toy-header">
      <h1 class="toy-title">DAMPED OSCILLATOR</h1>
    </header>
    
    <div class="toy-container">
      <div class="canvas-container">
        <canvas id="oscillator-canvas"></canvas>
      </div>
      
      <div class="controls-panel">
        <div class="control-section">
          <h3 class="control-title">Parameters</h3>
          
          <div class="control-group">
            <div class="control-label">
              <span>Mass (m)</span>
              <span class="control-value" id="mass-value">1.0 kg</span>
            </div>
            <input type="range" class="control-slider" id="mass-slider" min="0.1" max="5" step="0.1" value="1">
          </div>
          
          <div class="control-group">
            <div class="control-label">
              <span>Spring Constant (k)</span>
              <span class="control-value" id="k-value">10 N/m</span>
            </div>
            <input type="range" class="control-slider" id="k-slider" min="1" max="50" step="1" value="10">
          </div>
          
          <div class="control-group">
            <div class="control-label">
              <span>Damping (c)</span>
              <span class="control-value" id="damping-value">0.5</span>
            </div>
            <input type="range" class="control-slider" id="damping-slider" min="0" max="10" step="0.1" value="0.5">
          </div>
        </div>
        
        <div class="control-section">
          <h3 class="control-title">Controls</h3>
          
          <div class="control-group">
            <div class="control-label">
              <span>Initial Position</span>
              <span class="control-value" id="init-pos-value">100 px</span>
            </div>
            <input type="range" class="control-slider" id="init-pos-slider" min="20" max="200" step="1" value="100">
          </div>
          
          <div class="button-group">
            <button class="control-btn" id="start-btn">Start</button>
            <button class="control-btn" id="pause-btn">Pause</button>
            <button class="control-btn" id="reset-btn">Reset</button>
          </div>
        </div>
        
        <div class="control-section">
          <h3 class="control-title">Energy</h3>
          <div class="energy-display">
            <div class="energy-item">
              <div class="energy-label">Kinetic</div>
              <div class="energy-value" id="ke-value">0.00</div>
            </div>
            <div class="energy-item">
              <div class="energy-label">Potential</div>
              <div class="energy-value" id="pe-value">0.00</div>
            </div>
          </div>
        </div>
        
        <div class="control-section">
          <h3 class="control-title">Physics</h3>
          <div class="formula">
            <code>F = -kx - cv</code><br>
            <code>m*a = F</code><br><br>
            <span id="regime-text">System: Underdamped</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="../assets/js/gol.js"></script>
  <script>
    (function() {
      const canvas = document.getElementById('oscillator-canvas');
      const ctx = canvas.getContext('2d');
      
      let width, height;
      let mass = 1.0;
      let k = 10;
      let damping = 0.5;
      let initialDisplacement = 100;
      
      let position = 100;
      let velocity = 0;
      let isRunning = false;
      let lastTime = 0;
      
      const wallX = 80;
      const equilibriumX = 300;
      const springLength = 200;
      
      function resize() {
        const container = canvas.parentElement;
        const rect = container.getBoundingClientRect();
        width = rect.width;
        height = rect.height;
        canvas.width = width;
        canvas.height = height;
      }
      
      function updatePhysics(dt) {
        const force = -k * (position - initialDisplacement) - damping * velocity;
        const accel = force / mass;
        
        velocity += accel * dt;
        position += velocity * dt;
        
        if (position < 20) {
          position = 20;
          velocity = -velocity * 0.8;
        }
      }
      
      function drawSpring(x1, y, length) {
        const coils = 15;
        const amplitude = 12;
        const segmentLength = length / coils;
        
        ctx.beginPath();
        ctx.moveTo(x1, y);
        
        for (let i = 0; i < coils; i++) {
          const xOffset = (i % 2 === 0) ? amplitude : -amplitude;
          const x = x1 + segmentLength * (i + 0.5);
          ctx.lineTo(x, y + xOffset);
        }
        
        ctx.lineTo(x1 + length, y);
        ctx.stroke();
      }
      
      function draw() {
        ctx.clearRect(0, 0, width, height);
        
        const centerY = height / 2;
        const massX = wallX + springLength + position;
        
        ctx.strokeStyle = '#404040';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, centerY);
        ctx.lineTo(wallX, centerY);
        ctx.stroke();
        
        for (let i = 0; i < 5; i++) {
          ctx.beginPath();
          ctx.moveTo(wallX - 10, centerY - 15 + i * 15);
          ctx.lineTo(wallX, centerY - 15 + i * 15);
          ctx.stroke();
        }
        
        ctx.strokeStyle = '#cc2222';
        ctx.lineWidth = 3;
        drawSpring(wallX, centerY, springLength + position - 20);
        
        const massSize = 30 + mass * 5;
        ctx.fillStyle = '#f0f0f0';
        ctx.shadowColor = '#ff3333';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.rect(massX - massSize/2, centerY - massSize/2, massSize, massSize);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        ctx.strokeStyle = '#cc2222';
        ctx.lineWidth = 2;
        ctx.strokeRect(massX - massSize/2, centerY - massSize/2, massSize, massSize);
        
        ctx.fillStyle = '#a0a0a0';
        ctx.font = '14px VT323, monospace';
        ctx.fillText(`m = ${mass.toFixed(1)}`, massX - 25, centerY + massSize/2 + 25);
        ctx.fillText(`k = ${k}`, massX - 25, centerY + massSize/2 + 45);
        ctx.fillText(`c = ${damping.toFixed(1)}`, massX - 25, centerY + massSize/2 + 65);
        
        ctx.strokeStyle = '#2a2a2a';
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(wallX + springLength + initialDisplacement, centerY - 60);
        ctx.lineTo(wallX + springLength + initialDisplacement, centerY + 60);
        ctx.stroke();
        ctx.setLineDash([]);
        
        const ke = 0.5 * mass * velocity * velocity;
        const pe = 0.5 * k * Math.pow(position - initialDisplacement, 2);
        
        document.getElementById('ke-value').textContent = ke.toFixed(2);
        document.getElementById('pe-value').textContent = pe.toFixed(2);
        
        const omega0 = Math.sqrt(k / mass);
        const zeta = damping / (2 * Math.sqrt(k * mass));
        let regime = '';
        if (zeta < 1) regime = 'System: Underdamped';
        else if (zeta === 1) regime = 'System: Critically Damped';
        else regime = 'System: Overdamped';
        document.getElementById('regime-text').textContent = regime;
      }
      
      function animate(time) {
        if (lastTime === 0) lastTime = time;
        const dt = Math.min((time - lastTime) / 1000, 0.05);
        lastTime = time;
        
        if (isRunning) {
          updatePhysics(dt);
        }
        
        draw();
        requestAnimationFrame(animate);
      }
      
      const massSlider = document.getElementById('mass-slider');
      const kSlider = document.getElementById('k-slider');
      const dampingSlider = document.getElementById('damping-slider');
      const initPosSlider = document.getElementById('init-pos-slider');
      
      massSlider.addEventListener('input', (e) => {
        mass = parseFloat(e.target.value);
        document.getElementById('mass-value').textContent = `${mass.toFixed(1)} kg`;
      });
      
      kSlider.addEventListener('input', (e) => {
        k = parseFloat(e.target.value);
        document.getElementById('k-value').textContent = `${k} N/m`;
      });
      
      dampingSlider.addEventListener('input', (e) => {
        damping = parseFloat(e.target.value);
        document.getElementById('damping-value').textContent = damping.toFixed(1);
      });
      
      initPosSlider.addEventListener('input', (e) => {
        initialDisplacement = parseFloat(e.target.value);
        document.getElementById('init-pos-value').textContent = `${initialDisplacement} px`;
        if (!isRunning) {
          position = initialDisplacement;
          velocity = 0;
        }
      });
      
      document.getElementById('start-btn').addEventListener('click', () => {
        isRunning = true;
      });
      
      document.getElementById('pause-btn').addEventListener('click', () => {
        isRunning = false;
      });
      
      document.getElementById('reset-btn').addEventListener('click', () => {
        isRunning = false;
        position = initialDisplacement;
        velocity = 0;
        lastTime = 0;
      });
      
      canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const centerY = height / 2;
        const massX = wallX + springLength + position;
        
        const dx = x - massX;
        const dy = e.clientY - rect.top - centerY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const massSize = 30 + mass * 5;
        
        if (dist < massSize) {
          initialDisplacement = Math.max(20, Math.min(200, x - wallX - springLength));
          position = initialDisplacement;
          velocity = 0;
          initPosSlider.value = initialDisplacement;
          document.getElementById('init-pos-value').textContent = `${initialDisplacement} px`;
        }
      });
      
      window.addEventListener('resize', resize);
      resize();
      requestAnimationFrame(animate);
      
      (function() {
        const toggle = document.getElementById('theme-toggle');
        const sunIcon = toggle.querySelector('.sun-icon');
        const moonIcon = toggle.querySelector('.moon-icon');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateIcon(savedTheme);
        function updateIcon(theme) {
          if (theme === 'light') {
            sunIcon.style.display = 'block';
            moonIcon.style.display = 'none';
          } else {
            sunIcon.style.display = 'none';
            moonIcon.style.display = 'block';
          }
        }
        toggle.addEventListener('click', () => {
          const current = document.documentElement.getAttribute('data-theme');
          const next = current === 'light' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          updateIcon(next);
        });
      })();
    })();
  </script>
</body>
</html>
