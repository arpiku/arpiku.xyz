  <script>
    (function() {
      const toggle = document.getElementById('theme-toggle');
      const sunIcon = toggle.querySelector('.sun-icon');
      const moonIcon = toggle.querySelector('.moon-icon');
      
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      updateIcon(savedTheme);
      
      function updateIcon(theme) {
        if (theme === 'light') {
          sunIcon.style.display = 'block';
          moonIcon.style.display = 'none';
        } else {
          sunIcon.style.display = 'none';
          moonIcon.style.display = 'block';
        }
      }
      
      toggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateIcon(next);
      });
      
      const golToggle = document.getElementById('gol-toggle');
      const playIcon = golToggle.querySelector('.play-icon');
      const pauseIcon = golToggle.querySelector('.pause-icon');
      let golRunning = true;
      
      function updateGolIcon(running) {
        if (running) {
          playIcon.style.display = 'none';
          pauseIcon.style.display = 'block';
        } else {
          playIcon.style.display = 'block';
          pauseIcon.style.display = 'none';
        }
      }
      
      golToggle.addEventListener('click', () => {
        if (window.toggleGoL) {
          golRunning = window.toggleGoL();
        } else {
          golRunning = !golRunning;
        }
        updateGolIcon(golRunning);
      });
    })();
  </script>
